<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordPack</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #c4c6ca;
      }
      html.preload-transparent,
      html.preload-transparent body {
        background: transparent !important;
      }
    </style>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var view = params.get("view") || "main";
        document.documentElement.dataset.view = view;
        if (view === "icon" || view === "bubble" || view === "overlay") {
          document.documentElement.classList.add("preload-transparent");
        }
        window.__WORDPACK_PRELOAD_VIEW__ = view;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="light">
    <div id="app"></div>
    <script src="./app.js"></script>
  </body>
</html>
