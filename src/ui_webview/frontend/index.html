<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordPack</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #f2f3f0;
      }
    </style>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="light" class="view-main">
    <div id="app">
      <div class="window-shell">
        <section class="window-card">
          <header class="topbar">
            <div class="drag-row"><span class="app-badge">词小包 WordPack</span></div>
          </header>
          <section class="card result-card">
            <div class="card-head">
              <div class="card-title">正在启动</div>
            </div>
            <div class="result-pane pending"></div>
          </section>
        </section>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
