<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordPack</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #c4c6ca;
      }
      html.preload-main,
      html.preload-main body {
        background: #c4c6ca !important;
        background-image: none !important;
      }
      html.preload-dark,
      html.preload-dark body {
        background: #1b2028 !important;
        background-image: none !important;
      }
      html.preload-transparent,
      html.preload-transparent body {
        background: transparent !important;
        background-image: none !important;
      }
      html.preload-screenshot,
      html.preload-screenshot body {
        background: transparent !important;
        background-image: none !important;
      }
    </style>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var view = params.get("view") || "main";
        var theme = params.get("theme") || "light";
        var rev = params.get("rev") || String(Date.now());
        document.documentElement.dataset.view = view;
        if (view === "main") {
          document.documentElement.classList.add(theme === "dark" ? "preload-dark" : "preload-main");
        }
        if (view === "icon" || view === "bubble") {
          document.documentElement.classList.add("preload-transparent");
        }
        if (view === "screenshot") {
          document.documentElement.classList.add("preload-screenshot");
        }
        window.__WORDPACK_PRELOAD_VIEW__ = view;
        window.__WORDPACK_PRELOAD_THEME__ = theme === "dark" ? "dark" : "light";
        window.__WORDPACK_ASSET_REV__ = rev;
      })();
    </script>
    <script>
      (function () {
        var rev = window.__WORDPACK_ASSET_REV__ || String(Date.now());
        var css = document.createElement("link");
        css.rel = "stylesheet";
        css.href = "./styles.css?v=" + encodeURIComponent(rev);
        document.head.appendChild(css);
      })();
    </script>
  </head>
  <body data-theme="light">
    <script>
      (function () {
        var theme = window.__WORDPACK_PRELOAD_THEME__ || "light";
        document.body.setAttribute("data-theme", theme);
      })();
    </script>
    <div id="app"></div>
    <script>
      (function () {
        var rev = window.__WORDPACK_ASSET_REV__ || String(Date.now());
        var js = document.createElement("script");
        js.charset = "utf-8";
        js.src = "./app.js?v=" + encodeURIComponent(rev);
        document.body.appendChild(js);
      })();
    </script>
  </body>
</html>
