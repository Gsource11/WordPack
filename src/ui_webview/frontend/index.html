<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordPack</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #c4c6ca;
      }
      html.preload-transparent,
      html.preload-transparent body {
        background: transparent !important;
      }
    </style>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var view = params.get("view") || "main";
        var rev = params.get("rev") || String(Date.now());
        document.documentElement.dataset.view = view;
        if (view === "icon" || view === "bubble" || view === "overlay") {
          document.documentElement.classList.add("preload-transparent");
        }
        window.__WORDPACK_PRELOAD_VIEW__ = view;
        window.__WORDPACK_ASSET_REV__ = rev;
      })();
    </script>
    <script>
      (function () {
        var rev = window.__WORDPACK_ASSET_REV__ || String(Date.now());
        var css = document.createElement("link");
        css.rel = "stylesheet";
        css.href = "./styles.css?v=" + encodeURIComponent(rev);
        document.head.appendChild(css);
      })();
    </script>
  </head>
  <body data-theme="light">
    <div id="app"></div>
    <script>
      (function () {
        var rev = window.__WORDPACK_ASSET_REV__ || String(Date.now());
        var js = document.createElement("script");
        js.charset = "utf-8";
        js.src = "./app.js?v=" + encodeURIComponent(rev);
        document.body.appendChild(js);
      })();
    </script>
  </body>
</html>
